name: build-and-push-ghcr

on:
  schedule:
    # 每天检查一次上游 Release（GitHub schedule 使用 UTC，触发时间为 best-effort）
    # 01:17 UTC = 09:17 Asia/Shanghai
    - cron: "17 1 * * *"
  workflow_dispatch:
    inputs:
      codex_ref:
        description: "指定上游 codex 的 tag/ref（留空则使用 latest release tag）"
        required: false
        type: string
  push:
    branches: ["main"]
    paths:
      - "Dockerfile"
      - "entrypoint.sh"
      - ".github/workflows/build-and-push-ghcr.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: build-and-push-ghcr
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Normalize image owner (lowercase)
        id: owner
        shell: bash
        run: |
          set -euo pipefail
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Resolve upstream codex ref
        id: ref
        shell: bash
        run: |
          set -euo pipefail
          input_ref='${{ inputs.codex_ref }}'
          if [ -n "${input_ref}" ]; then
            echo "codex_ref=${input_ref}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          codex_ref="$(curl -fsSL https://api.github.com/repos/stellarlinkco/codex/releases/latest | jq -r .tag_name)"
          if [ -z "${codex_ref}" ] || [ "${codex_ref}" = "null" ]; then
            echo "Failed to resolve upstream latest release tag" >&2
            exit 1
          fi
          echo "codex_ref=${codex_ref}" >> "$GITHUB_OUTPUT"

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image tag already exists
        id: exists
        if: github.event_name == 'schedule'
        shell: bash
        run: |
          set -euo pipefail
          image="ghcr.io/${{ steps.owner.outputs.owner }}/codex-docker"
          tag="${{ steps.ref.outputs.codex_ref }}"
          if docker buildx imagetools inspect "${image}:${tag}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & Push
        if: github.event_name != 'schedule' || steps.exists.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            CODEX_REF=${{ steps.ref.outputs.codex_ref }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/codex-docker:${{ steps.ref.outputs.codex_ref }}
            ghcr.io/${{ steps.owner.outputs.owner }}/codex-docker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
